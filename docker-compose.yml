services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GBRC_CORS_ORIGINS=["http://localhost:9200","http://localhost:5173"]
      - GBRC_DEBUG=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "9200:80"
    depends_on:
      backend:
        condition: service_healthy
