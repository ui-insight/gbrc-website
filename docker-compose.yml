services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: gbrc
      POSTGRES_USER: gbrc
      POSTGRES_PASSWORD: gbrc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gbrc"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - GBRC_CORS_ORIGINS=["http://localhost:9200","http://localhost:5173"]
      - GBRC_DEBUG=true
      - GBRC_DATABASE_URL=postgresql+asyncpg://gbrc:gbrc@postgres:5432/gbrc
      - GBRC_MINDROUTER_API_KEY=${GBRC_MINDROUTER_API_KEY}
      - GBRC_MINDROUTER_MODEL=openai/gpt-oss-120b
      - GBRC_MINDROUTER_OCR_MODEL=dots.OCR
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "9200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
